[project]
name = "taskdog-ui"
version = "0.23.0"
description = "CLI and TUI for Taskdog task management system"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "Kohei Wada" }
]
license = { text = "MIT" }
keywords = ["task", "management", "cli", "tui"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

dependencies = [
    "taskdog-core==0.23.0",
    "taskdog-client==0.23.0",
    "click>=8.4.2",
    "rich>=14.2.0",
    "textual>=8.2.8",
    "textual-plotext>=1.0.0",
    "python-dateutil>=2.8.0",
    "websockets>=14.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-asyncio>=1.0.0",
    "mypy>=1.0.0",
    "ruff>=0.15.20",
]
server = [
    "taskdog-server==0.23.0",
]

[project.scripts]
taskdog = "taskdog.cli_main:cli"

[project.urls]
Homepage = "https://github.com/Kohei-Wada/taskdog"
Repository = "https://github.com/Kohei-Wada/taskdog"
"Bug Tracker" = "https://github.com/Kohei-Wada/taskdog/issues"

[build-system]
requires = ["setuptools>=83.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["taskdog*"]

[tool.setuptools.package-data]
taskdog = ["py.typed"]
"taskdog.tui.styles" = ["*.tcss"]

[tool.mypy]
python_version = "3.13"
strict = true
# Disable unused-ignore warnings (environment-dependent)
warn_unused_ignores = false

# Ignore missing imports for taskdog_client (installed separately)
[[tool.mypy.overrides]]
module = "taskdog_client"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "textual_plotext"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
